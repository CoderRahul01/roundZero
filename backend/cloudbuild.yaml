steps:
  # 1. Build the container image using Docker
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/roundzero-backend:latest"
      - "--cache-from"
      - "gcr.io/$PROJECT_ID/roundzero-backend:latest"
      - "."

  # 2. Push the container image to Google Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/roundzero-backend:latest"

  # 3. Deploy the container to Google Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "roundzero-backend" # Service name
      - "--image"
      - "gcr.io/$PROJECT_ID/roundzero-backend:latest"
      - "--region"
      - "us-central1" # Recommended region; change if needed
      - "--allow-unauthenticated"
      - "--session-affinity" # CRITICAL for WebSockets
      - "--port"
      - "8080"

images:
  - "gcr.io/$PROJECT_ID/roundzero-backend:latest"
