[phases.setup]
nixPkgs = ["python313", "uv"]

[phases.install]
cmds = [
  "cd backend",
  "uv sync --frozen"
]

[phases.build]
cmds = [
  "cd backend",
  "uv run python -c 'from sentence_transformers import SentenceTransformer; SentenceTransformer(\"all-MiniLM-L6-v2\")'"
]

[start]
cmd = "cd backend && uv run uvicorn main:app --host 0.0.0.0 --port $PORT"
