name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Sync dependencies
        run: UV_CACHE_DIR=/tmp/uvcache uv sync --dev
      - name: Lint
        run: UV_CACHE_DIR=/tmp/uvcache uv run ruff check .
      - name: Tests
        run: UV_CACHE_DIR=/tmp/uvcache uv run python -m unittest discover -s tests -p "test_*.py"

  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        env:
          GENERATE_SOURCEMAP: "false"
        run: npm run build
